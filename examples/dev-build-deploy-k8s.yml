# Build and deploy to the kubernetes dev cluster
# This workflow finds all PR labels in the form "deploy-to-<env>" and deploys to all <env> in those labels.

name: Dev - Build and Deploy on push

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

defaults:
  run:
    shell: bash

jobs:
  # Looks for labels like "deploy-to-<env>" attached to a PR so we can deploy to those envs

  get-deploy-labels:
    runs-on: mdb-dev
    outputs:
      deploy-envs: ${{ steps.get-labels.outputs.deploy-envs }}
    steps:
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - id: get-labels
        uses: ./github-actions/get-deploy-labels

  build-frontend:
    runs-on: mdb-dev
    needs: [get-deploy-labels]
    if: needs.get-deploy-labels.outputs.deploy-envs != '[]'
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/build-push-ecr
        with:
          module-name: mindsdb-frontend
          build-for-environment: development

  deploy:
    runs-on: mdb-dev
    needs: [build-frontend, get-deploy-labels]
    if: needs.get-deploy-labels.outputs.deploy-envs != '[]'
    strategy:
      matrix:
        deploy-env: ${{fromJson(needs.get-deploy-labels.outputs.deploy-envs)}}
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/setup-env
      - name: Notify of deployment starting
        id: slack
        uses: ./github-actions/slack-deploy-msg
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: 'started'
          color: '#0099CC'
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MINDSDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
      - uses: DevOps-Nirvana/aws-helm-multi-deploy-nodocker@v2
        with:
          environment-slug: ${{matrix.deploy-env}}
          k8s-namespace: ${{matrix.deploy-env}}
          image-tag: development-${{ env.SLUG }}
          timeout: 600s
      - name: Notify of deployment finish
        uses: ./github-actions/slack-deploy-msg
        if: always()
        with:
          channel-id: ${{ secrets.SLACK_DEPLOYMENTS_CHANNEL_ID }}
          status: "${{ job.status == 'success' && 'finished' || 'failed' }}"
          color: "${{ job.status == 'success' && '#00C851' || '#FF4444' }}"
          env-name: ${{ matrix.deploy-env }}
          env-url: ${{ vars.MINDSDB_ENV_URL }}
          slack-token: ${{ secrets.GH_ACTIONS_SLACK_BOT_TOKEN }}
          update-message-id: ${{ steps.slack.outputs.ts }}
