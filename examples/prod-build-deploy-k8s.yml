# Build and deploy to the kubernetes prod cluster

name: Prod - Build and Deploy on release

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: mdb-dev
    steps:
      - uses: actions/checkout@v4
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - uses: ./github-actions/build-push-ecr
        with:
          module-name: mindsdb-frontend
          build-for-environment: production
          image-ref: ${{ env.CI_REF_NAME_SLUG }}

  call-release-workflow:
    needs: [build]
    uses: ./.github/workflows/release-gui-to-production.yml
    secrets: inherit
