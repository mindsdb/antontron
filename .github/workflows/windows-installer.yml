name: Windows Installer

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    tags:
      - "v*"

jobs:
  build-win-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export python path for npm/node-gyp
        shell: pwsh
        run: |
          "npm_config_python=$((Get-Command python).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      - name: Build Windows installer (unsigned)
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Resolve installer path
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem release\*.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer .exe found in release/" }
          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve app executable path
        id: app_exe
        shell: pwsh
        run: |
          $appExe = Get-ChildItem release\win-unpacked\*.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch 'Uninstall' } |
            Select-Object -First 1
          if ($appExe) {
            "has_app_exe=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "app_exe_path=$($appExe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "has_app_exe=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Sign installer with SSL.com eSigner
        if: ${{ github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_USERNAME }}
          password: ${{ secrets.SSL_PASSWORD }}
          credential_id: ${{ secrets.SSL_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_TOTP_SECRET }}
          file_path: ${{ steps.installer.outputs.exe_path }}
          output_path: ${{ github.workspace }}\signed

      - name: Sign app executable with SSL.com eSigner
        if: ${{ (github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository)) && steps.app_exe.outputs.has_app_exe == 'true' }}
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_USERNAME }}
          password: ${{ secrets.SSL_PASSWORD }}
          credential_id: ${{ secrets.SSL_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_TOTP_SECRET }}
          file_path: ${{ steps.app_exe.outputs.app_exe_path }}
          output_path: ${{ github.workspace }}\signed

      - name: Replace unsigned installer with signed output
        if: ${{ github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: pwsh
        run: |
          $unsignedPath = "${{ steps.installer.outputs.exe_path }}"
          $fileName = Split-Path $unsignedPath -Leaf
          $signedPath = Join-Path "$env:GITHUB_WORKSPACE\signed" $fileName
          if (!(Test-Path $signedPath)) {
            throw "Signed file not found at $signedPath"
          }
          Copy-Item $signedPath $unsignedPath -Force

      - name: Replace unsigned app executable with signed output
        if: ${{ (github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository)) && steps.app_exe.outputs.has_app_exe == 'true' }}
        shell: pwsh
        run: |
          $unsignedPath = "${{ steps.app_exe.outputs.app_exe_path }}"
          $fileName = Split-Path $unsignedPath -Leaf
          $signedPath = Join-Path "$env:GITHUB_WORKSPACE\signed" $fileName
          if (!(Test-Path $signedPath)) {
            throw "Signed app executable not found at $signedPath"
          }
          Copy-Item $signedPath $unsignedPath -Force

      - name: Verify installer signature
        if: ${{ github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: pwsh
        run: |
          $exe = "${{ steps.installer.outputs.exe_path }}"
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if ($signtool) {
            & $signtool verify /pa /all /v "$exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit code $LASTEXITCODE" }
          } else {
            Write-Host "signtool.exe not found in Windows SDK path, using Get-AuthenticodeSignature fallback"
          }

          $signature = Get-AuthenticodeSignature -FilePath $exe
          if ($signature.Status -ne 'Valid') {
            throw "Signature verification failed. Status: $($signature.Status) - $($signature.StatusMessage)"
          }
          if (-not $signature.TimeStamperCertificate) {
            throw "Timestamp verification failed: signature does not include a timestamp certificate."
          }

      - name: Verify app executable signature
        if: ${{ (github.event_name != 'pull_request' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'signed-windows-ev') && github.event.pull_request.head.repo.full_name == github.repository)) && steps.app_exe.outputs.has_app_exe == 'true' }}
        shell: pwsh
        run: |
          $exe = "${{ steps.app_exe.outputs.app_exe_path }}"
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if ($signtool) {
            & $signtool verify /pa /all /v "$exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed for app executable with exit code $LASTEXITCODE" }
          }
          $signature = Get-AuthenticodeSignature -FilePath $exe
          if ($signature.Status -ne 'Valid') {
            throw "App executable signature verification failed. Status: $($signature.Status) - $($signature.StatusMessage)"
          }

      - name: Generate installer signing report
        shell: pwsh
        run: |
          $exe = "${{ steps.installer.outputs.exe_path }}"
          $reportDir = Join-Path "$env:GITHUB_WORKSPACE\release" "signing-report"
          New-Item -ItemType Directory -Path $reportDir -Force | Out-Null

          $signature = Get-AuthenticodeSignature -FilePath $exe
          $hash = (Get-FileHash -Path $exe -Algorithm SHA256).Hash
          $fileName = Split-Path $exe -Leaf

          $report = [ordered]@{
            file = $fileName
            filePath = $exe
            sha256 = $hash
            status = "$($signature.Status)"
            statusMessage = "$($signature.StatusMessage)"
            signerSubject = "$($signature.SignerCertificate.Subject)"
            signerThumbprint = "$($signature.SignerCertificate.Thumbprint)"
            signerNotBefore = "$($signature.SignerCertificate.NotBefore)"
            signerNotAfter = "$($signature.SignerCertificate.NotAfter)"
            timestampSubject = "$($signature.TimeStamperCertificate.Subject)"
            timestampThumbprint = "$($signature.TimeStamperCertificate.Thumbprint)"
            timestampNotAfter = "$($signature.TimeStamperCertificate.NotAfter)"
            eventName = "${{ github.event_name }}"
          }

          $jsonPath = Join-Path $reportDir "installer-signature-report.json"
          $txtPath = Join-Path $reportDir "installer-signature-report.txt"

          $report | ConvertTo-Json -Depth 5 | Set-Content -Path $jsonPath -Encoding UTF8
          @(
            "file: $($report.file)"
            "sha256: $($report.sha256)"
            "status: $($report.status)"
            "statusMessage: $($report.statusMessage)"
            "signerSubject: $($report.signerSubject)"
            "signerThumbprint: $($report.signerThumbprint)"
            "signerNotAfter: $($report.signerNotAfter)"
            "timestampSubject: $($report.timestampSubject)"
            "timestampThumbprint: $($report.timestampThumbprint)"
            "timestampNotAfter: $($report.timestampNotAfter)"
            "eventName: $($report.eventName)"
          ) | Set-Content -Path $txtPath -Encoding UTF8

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/signing-report/*.json
            release/signing-report/*.txt
