name: Publish UI Bundle

on:
  push:
    tags:
      - 'ui-v*'    # e.g. ui-v1.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'UI version (e.g. 1.2.0)'
        required: true

permissions:
  contents: write
  pages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=ui-v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#ui-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package renderer bundle
        run: |
          cd dist/renderer
          tar czf ../../ui-bundle.tar.gz .
          cd ../..
          sha256sum ui-bundle.tar.gz | awk '{print $1}' > ui-bundle.sha256

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Create tag if workflow_dispatch (tag might not exist yet)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag "$TAG" || true
            git push origin "$TAG" || true
          fi

          gh release create "$TAG" \
            --title "UI $VERSION" \
            --notes "Renderer UI bundle v${VERSION}" \
            ui-bundle.tar.gz

          # Get the asset download URL
          ASSET_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name=="ui-bundle.tar.gz") | .url')
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Build latest.json for GitHub Pages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA256=$(cat ui-bundle.sha256)

          # Use the direct download URL that doesn't need API auth
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/ui-bundle.tar.gz"

          mkdir -p gh-pages
          cat > gh-pages/latest.json << EOF
          {
            "version": "${VERSION}",
            "url": "${DOWNLOAD_URL}",
            "sha256": "${SHA256}"
          }
          EOF

          # Clean up whitespace from heredoc indentation
          python3 -c "
          import json, sys
          with open('gh-pages/latest.json') as f:
              data = json.load(f)
          with open('gh-pages/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: true
