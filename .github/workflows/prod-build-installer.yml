name: Prod - Build installer on release

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Release tag the caller just created (e.g. v2.0.5)"
        required: true
        type: string

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  verify-release-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.verify.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify release tag matches package.json version
        id: verify
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event=${{ github.event_name }})"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag $TAG does not match expected format vX.Y.Z[-prerelease]"
            exit 1
          fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PKG_VERSION}" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version v${PKG_VERSION}"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          
  build-macos:
    needs: verify-release-tag
    uses: ./.github/workflows/build-macos-pkg.yml
    with:
      build_kind: prod
    secrets: inherit

  upload-macos:
    needs: build-macos
    uses: ./.github/workflows/upload-installer-to-s3.yml
    with:
      platform: mac
      build_kind: prod
      artifact_name: ${{ needs.build-macos.outputs.artifact_name }}

  build-windows:
    needs: verify-release-tag
    uses: ./.github/workflows/build-windows-installer.yml
    with:
      build_kind: prod
    secrets: inherit

  upload-windows:
    needs: build-windows
    uses: ./.github/workflows/upload-installer-to-s3.yml
    with:
      platform: windows
      build_kind: prod
      artifact_name: ${{ needs.build-windows.outputs.artifact_name }}
