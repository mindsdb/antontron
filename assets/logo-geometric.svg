<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 144" width="192" height="144">
  <rect width="192" height="144" fill="#1a1a1a"/>

  <!-- Formas alineadas a la izquierda, espacio vacťo a la derecha -->
  <g fill="#c8c8c8" stroke="#3d3d3d" stroke-width="0.5">
    <!-- L: fila superior (0,0)(0,1)(0,2), fila inferior (1,0) -->
    <rect x="12" y="12" width="24" height="24"/>
    <rect x="36" y="12" width="24" height="24"/>
    <rect x="60" y="12" width="24" height="24"/>
    <rect x="12" y="36" width="24" height="24"/>

    <!-- T: fila superior (0,0)(0,1)(0,2), tallo (1,1) -->
    <rect x="12" y="84" width="24" height="24"/>
    <rect x="36" y="84" width="24" height="24"/>
    <rect x="60" y="84" width="24" height="24"/>
    <rect x="36" y="108" width="24" height="24"/>
  </g>
</svg>
