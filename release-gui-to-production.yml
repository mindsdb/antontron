name: Release New GUI Version to Production

on:
  workflow_call:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-and-release:
    runs-on: mdb-prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Run install
        uses: borales/actions-yarn@v4
        with:
          cmd: install --ignore-engines # will run `yarn install` command
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Get latest GUI version from package.json
        id: gui-version
        run: |
          GUI_VERSION=$(node -p "require('./package.json').version")
          echo "GUI_VERSION=$GUI_VERSION" >> $GITHUB_ENV
          echo "gui_version=$GUI_VERSION" >> $GITHUB_OUTPUT
          echo "Using GUI version: $GUI_VERSION"

      - name: Set ZIP filename
        run: |
          echo "ZIP_FILENAME=dist-V${{ env.GUI_VERSION }}.zip" >> $GITHUB_ENV
          echo "Using ZIP filename: ${{ env.ZIP_FILENAME }}"

      - name: Set config filename
        run: |
          echo "CONFIG_FILENAME=compatible-config.json" >> $GITHUB_ENV
          echo "Using config filename: ${{ env.CONFIG_FILENAME }}"

      - name: Set S3 bucket name
        run: |
          echo "S3_BUCKET_NAME=mindsdb-web-builds" >> $GITHUB_ENV
          echo "Using S3 bucket: ${{ env.S3_BUCKET_NAME }}"

      - name: Fetch latest MindsDB version
        id: mindsdb-version
        run: |
          # Get the latest release version from the MindsDB repository
          LATEST_VERSION=$(curl -s https://api.github.com/repos/mindsdb/mindsdb/releases/latest | jq -r .tag_name | sed 's/^v//')
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            # Fallback in case the API call doesn't work
            LATEST_VERSION="25.5.1.0"
            echo "Could not retrieve latest version, using fallback: $LATEST_VERSION"
          else
            echo "Latest MindsDB version: $LATEST_VERSION"
          fi
          echo "MINDSDB_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "mindsdb_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Build GUI locally
        run: yarn run build-local
        env:
          REACT_APP_VERSION: ${{ env.GUI_VERSION }}

      - name: Compress build folder
        run: |
          cd dist
          zip -r "../${{ env.ZIP_FILENAME }}" .
          cd ..

      - name: Upload build to S3
        run: |
          aws s3 cp "${{ env.ZIP_FILENAME }}" s3://${{ env.S3_BUCKET_NAME }}/
          echo "Uploaded ${{ env.ZIP_FILENAME }} to S3"

      - name: Download compatibility file from S3
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/${{ env.CONFIG_FILENAME }} ./${{ env.CONFIG_FILENAME }}
          echo "Downloaded ${{ env.CONFIG_FILENAME }} from S3"

      - name: Update compatibility file
        run: |
          # Check if the version already exists in the file
          if grep -q "\"gui_version\": \"${{ env.GUI_VERSION }}\"," ${{ env.CONFIG_FILENAME }}; then
            echo "GUI version ${{ env.GUI_VERSION }} already exists in compatibility file. Skipping update."
          else
            # Create new entry and update the compatibility file using jq
            jq --arg gui "${{ env.GUI_VERSION }}" --arg mdb "${{ env.MINDSDB_VERSION }}" \
              '.mindsdb += [{"gui_version": $gui, "mindsdb_version": $mdb}]' \
              ${{ env.CONFIG_FILENAME }} > temp.json && mv temp.json ${{ env.CONFIG_FILENAME }}

            # Upload updated compatibility file back to S3
            aws s3 cp ./${{ env.CONFIG_FILENAME }} s3://${{ env.S3_BUCKET_NAME }}/${{ env.CONFIG_FILENAME }}

            echo "Updated compatibility file with GUI version ${{ env.GUI_VERSION }} and MindsDB version ${{ env.MINDSDB_VERSION }}"
          fi
